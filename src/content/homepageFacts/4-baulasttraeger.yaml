position: 2
fact: 4 Baulastträger
subline: Gemeinsame Planung und Umsetzung
description: >-
  Die Stadt Bielefeld, der Kreis Gütersloh, Straßen.NRW und die Stadt Halle
  (Westf.) planen die Veloroute gemeinsam. Weitere beteiligte Kommunen sind die
  Gemeinde Steinhagen und die Stadt Borgholzhausen.
