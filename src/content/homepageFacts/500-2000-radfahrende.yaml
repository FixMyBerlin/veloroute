position: 3
fact: 500–2.000
subline: Radfahrende pro Tag (Potenzial)
description: >-
  Laut Machbarkeitsstudie (2021) wird das Nutzungspotenzial auf 500 bis 2.000
  Radfahrende pro Tag geschätzt. Die wachsende Verbreitung von E-Bikes erhöht
  das Potenzial der Route für längere Pendlerstrecken deutlich.
