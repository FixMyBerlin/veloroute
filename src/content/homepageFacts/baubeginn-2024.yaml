position: 4
fact: Seit 2024
subline: im Bau
description: >-
  Halle (Westf.) Innenstadt wird seit 2024 gebaut. Die Abschnitte
  Steinhagen–Bielefeld (ca. 8,0 km) sowie Borgholzhausen–Halle (ca. 6,0 km) und
  Halle (ca. 5,4 km) sollen ab Anfang 2027 gebaut werden. Der Abschnitt
  Ortsdurchfahrt Quelle (ca. 1 km) folgt ab Anfang 2028.
