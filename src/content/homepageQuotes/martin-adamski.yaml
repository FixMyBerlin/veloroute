quote: >-
  Es ist wichtig, dass Mobilität nicht nur bis an die eigene Stadtgrenze gedacht
  wird. Mit der Veloroute setzen wir diesen Gedanken gemeinsam mit unseren
  Nachbarkommunen um.
name: Martin Adamski
position: Verkehrsdezernent der Stadt Bielefeld
